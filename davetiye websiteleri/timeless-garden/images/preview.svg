<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 360" width="260" height="360">
  <defs>
    <linearGradient id="cg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#faf5ea"/>
      <stop offset="100%" stop-color="#f0e6d2"/>
    </linearGradient>
  </defs>

  <!-- Cream paper background -->
  <rect width="260" height="360" fill="url(#cg)"/>

  <!-- Left botanical border strip -->
  <g opacity="0.40">
    <path d="M14,0 Q11,45 13,90 Q10,135 13,180 Q10,225 13,270 Q10,315 13,360"
          stroke="rgba(148,118,52,0.55)" stroke-width="0.9" fill="none"/>
    <!-- Flowers -->
    <ellipse cx="20" cy="50"  rx="2.8" ry="6" transform="rotate(-30 20 50)"  fill="rgba(148,118,52,0.28)"/>
    <ellipse cx="20" cy="50"  rx="2.8" ry="6" transform="rotate(30 20 50)"   fill="rgba(148,118,52,0.28)"/>
    <circle  cx="20" cy="50" r="3" fill="rgba(148,118,52,0.40)"/>
    <ellipse cx="18" cy="120" rx="2.5" ry="5.5" transform="rotate(-25 18 120)" fill="rgba(148,118,52,0.25)"/>
    <ellipse cx="18" cy="120" rx="2.5" ry="5.5" transform="rotate(25 18 120)"  fill="rgba(148,118,52,0.25)"/>
    <circle  cx="18" cy="120" r="2.5" fill="rgba(148,118,52,0.38)"/>
    <!-- Rose at y=200 -->
    <path d="M16,200 Q8,192 9,183 Q16,187 16,200Z" fill="rgba(148,118,52,0.24)"/>
    <path d="M16,200 Q24,192 23,183 Q16,187 16,200Z" fill="rgba(148,118,52,0.21)"/>
    <path d="M16,200 Q24,204 24,212 Q17,210 16,200Z" fill="rgba(148,118,52,0.24)"/>
    <path d="M16,200 Q8,204 8,212 Q15,210 16,200Z" fill="rgba(148,118,52,0.21)"/>
    <circle cx="16" cy="200" r="3.5" fill="rgba(148,118,52,0.38)"/>
    <!-- Leaves -->
    <path d="M13,270 Q5,263 3,254 Q11,257 13,270Z" fill="rgba(148,118,52,0.26)"/>
    <path d="M13,310 Q5,304 3,295 Q11,298 13,310Z" fill="rgba(148,118,52,0.22)"/>
  </g>

  <!-- Right botanical border strip -->
  <g opacity="0.40" transform="translate(260,0) scale(-1,1)">
    <path d="M14,0 Q11,45 13,90 Q10,135 13,180 Q10,225 13,270 Q10,315 13,360"
          stroke="rgba(148,118,52,0.55)" stroke-width="0.9" fill="none"/>
    <ellipse cx="20" cy="50"  rx="2.8" ry="6" transform="rotate(-30 20 50)"  fill="rgba(148,118,52,0.28)"/>
    <ellipse cx="20" cy="50"  rx="2.8" ry="6" transform="rotate(30 20 50)"   fill="rgba(148,118,52,0.28)"/>
    <circle  cx="20" cy="50"  r="3" fill="rgba(148,118,52,0.40)"/>
    <ellipse cx="18" cy="120" rx="2.5" ry="5.5" transform="rotate(-25 18 120)" fill="rgba(148,118,52,0.25)"/>
    <ellipse cx="18" cy="120" rx="2.5" ry="5.5" transform="rotate(25 18 120)"  fill="rgba(148,118,52,0.25)"/>
    <circle  cx="18" cy="120" r="2.5" fill="rgba(148,118,52,0.38)"/>
    <path d="M16,200 Q8,192 9,183 Q16,187 16,200Z" fill="rgba(148,118,52,0.24)"/>
    <path d="M16,200 Q24,192 23,183 Q16,187 16,200Z" fill="rgba(148,118,52,0.21)"/>
    <path d="M16,200 Q24,204 24,212 Q17,210 16,200Z" fill="rgba(148,118,52,0.24)"/>
    <path d="M16,200 Q8,204 8,212 Q15,210 16,200Z" fill="rgba(148,118,52,0.21)"/>
    <circle cx="16" cy="200" r="3.5" fill="rgba(148,118,52,0.38)"/>
    <path d="M13,270 Q5,263 3,254 Q11,257 13,270Z" fill="rgba(148,118,52,0.26)"/>
    <path d="M13,310 Q5,304 3,295 Q11,298 13,310Z" fill="rgba(148,118,52,0.22)"/>
  </g>

  <!-- Venue arch sketch (top center) -->
  <g transform="translate(80,18)" fill="none" stroke="rgba(148,118,52,0.42)" stroke-width="0.7" stroke-linecap="round">
    <line x1="18" y1="16" x2="18" y2="60"/>
    <line x1="82" y1="16" x2="82" y2="60"/>
    <path d="M18,16 Q50,2 82,16"/>
    <line x1="18" y1="28" x2="82" y2="28" stroke-width="0.5"/>
    <path d="M18,16 Q32,36 40,32 Q50,28 60,32 Q68,36 82,16"
          fill="rgba(148,118,52,0.07)" stroke="rgba(148,118,52,0.25)" stroke-width="0.6"/>
