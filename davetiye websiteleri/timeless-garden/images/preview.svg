    <path d="M5,12 Q30,18 50,14 Q70,10 95,15" stroke="rgba(184,154,74,0.40)" stroke-width="0.5"/>
    <circle cx="18" cy="14" r="1.2" fill="rgba(184,154,74,0.65)"/>
    <circle cx="34" cy="17" r="1.0" fill="rgba(184,154,74,0.55)"/>
    <circle cx="50" cy="14" r="1.2" fill="rgba(184,154,74,0.65)"/>
    <circle cx="66" cy="13" r="1.0" fill="rgba(184,154,74,0.55)"/>
    <circle cx="82" cy="14" r="1.2" fill="rgba(184,154,74,0.65)"/>
    <!-- Steps -->
    <rect x="31" y="56" width="38" height="3" fill="rgba(148,118,52,0.12)"/>
    <rect x="26" y="59" width="48" height="3" fill="rgba(148,118,52,0.09)"/>
  </g>

  <!-- Couple names -->
  <text x="130" y="110" text-anchor="middle"
        font-family="'Cormorant Garamond', Georgia, serif" font-size="24" font-weight="700"
        fill="#3d2e14" letter-spacing="3">BÜŞRA &amp; SİNAN</text>

  <!-- WEDDING INVITATION gold label -->
  <text x="130" y="124" text-anchor="middle"
        font-family="'Inter', Arial, sans-serif" font-size="6.5" font-weight="600"
        fill="rgba(184,154,74,0.80)" letter-spacing="4">WEDDING INVITATION</text>

  <!-- Gold ornament separator -->
  <line x1="55"  y1="132" x2="108" y2="132" stroke="rgba(184,154,74,0.45)" stroke-width="0.6"/>
  <circle cx="113" cy="132" r="1.5" fill="rgba(184,154,74,0.55)"/>
  <polygon points="130,128 133,132 130,136 127,132" fill="rgba(184,154,74,0.60)"/>
  <circle cx="147" cy="132" r="1.5" fill="rgba(184,154,74,0.55)"/>
  <line x1="152" y1="132" x2="205" y2="132" stroke="rgba(184,154,74,0.45)" stroke-width="0.6"/>

  <!-- Invitation text -->
  <text x="130" y="148" text-anchor="middle"
        font-family="Georgia, serif" font-style="italic" font-size="8" fill="rgba(45,56,32,0.65)">Bu güzel anımıza tanıklık etmeniz için</text>
  <text x="130" y="158" text-anchor="middle"
        font-family="Georgia, serif" font-style="italic" font-size="8" fill="rgba(45,56,32,0.65)">sizi aramızda görmekten mutluluk duyarız.</text>

  <!-- Date section separator -->
  <line x1="70" y1="168" x2="190" y2="168" stroke="rgba(184,154,74,0.38)" stroke-width="0.5"/>

  <!-- Date -->
  <text x="130" y="182" text-anchor="middle"
        font-family="Georgia, serif" font-size="11" font-weight="600" fill="#3d2e14" letter-spacing="2">23 AĞUSTOS 2026</text>
  <text x="130" y="194" text-anchor="middle"
        font-family="Arial, sans-serif" font-size="7.5" fill="rgba(74,94,56,0.80)" letter-spacing="2">SAAT: 20:00</text>

  <!-- Venue separator -->
  <line x1="70" y1="204" x2="190" y2="204" stroke="rgba(184,154,74,0.38)" stroke-width="0.5"/>

  <!-- Venue -->
  <text x="130" y="218" text-anchor="middle"
        font-family="Georgia, serif" font-size="10" font-weight="700" fill="#3d2e14" letter-spacing="2">GLORIA MERAM</text>
  <text x="130" y="228" text-anchor="middle"
        font-family="Arial, sans-serif" font-size="6.5" fill="rgba(184,154,74,0.75)" letter-spacing="3">DÜĞÜN SALONU</text>

  <!-- Polaroid photos hint -->
  <g transform="translate(50,248)">
    <rect x="0"  y="5"  width="44" height="44" fill="#fff" transform="rotate(-5 22 27)" opacity="0.90"/>
    <rect x="50" y="0"  width="44" height="44" fill="#fff" opacity="0.90"/>
    <rect x="100" y="5" width="44" height="44" fill="#fff" transform="rotate(4 122 27)" opacity="0.90"/>
    <rect x="3"   y="8"  width="38" height="33" fill="rgba(148,118,52,0.22)" transform="rotate(-5 22 27)"/>
    <rect x="53"  y="3"  width="38" height="33" fill="rgba(148,118,52,0.18)"/>
    <rect x="103" y="8"  width="38" height="33" fill="rgba(148,118,52,0.22)" transform="rotate(4 122 27)"/>
  </g>

  <!-- Dark warm-brown footer with zigzag -->
  <clipPath id="zzClip">
    <polygon points="0,315 2.4,305 4.8,315 7.2,305 9.6,315 12,305 14.4,315 16.8,305 19.2,315 21.6,305 24,315 26.4,305 28.8,315 31.2,305 33.6,315 36,305 38.4,315 40.8,305 43.2,315 45.6,305 48,315 50.4,305 52.8,315 55.2,305 57.6,315 60,305 62.4,315 64.8,305 67.2,315 69.6,305 72,315 74.4,305 76.8,315 79.2,305 81.6,315 84,305 86.4,315 88.8,305 91.2,315 93.6,305 96,315 98.4,305 100.8,315 103.2,305 105.6,315 108,305 110.4,315 112.8,305 115.2,315 117.6,305 120,315 122.4,305 124.8,315 127.2,305 129.6,315 132,305 134.4,315 136.8,305 139.2,315 141.6,305 144,315 146.4,305 148.8,315 151.2,305 153.6,315 156,305 158.4,315 160.8,305 163.2,315 165.6,305 168,315 170.4,305 172.8,315 175.2,305 177.6,315 180,305 182.4,315 184.8,305 187.2,315 189.6,305 192,315 194.4,305 196.8,315 199.2,305 201.6,315 204,305 206.4,315 208.8,305 211.2,315 213.6,305 216,315 218.4,305 220.8,315 223.2,305 225.6,315 228,305 230.4,315 232.8,305 235.2,315 237.6,305 240,315 242.4,305 244.8,315 247.2,305 249.6,315 252,305 254.4,315 256.8,305 259.2,315 260,305 260,360 0,360"/>
  </clipPath>
  <rect x="0" y="300" width="260" height="60" fill="#3d2e14" clip-path="url(#zzClip)"/>

  <!-- Gold rings in footer -->
  <circle cx="118" cy="338" r="12" fill="none" stroke="rgba(184,154,74,0.70)" stroke-width="1.8"/>
  <circle cx="142" cy="338" r="12" fill="none" stroke="rgba(184,154,74,0.70)" stroke-width="1.8"/>
</svg>
